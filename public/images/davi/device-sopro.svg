<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 360" role="img" aria-label="Ilustração: sensor de sopro com tubo flexível">
  <defs>
    <linearGradient id="gs" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#f0fdf4"/>
      <stop offset="1" stop-color="#dcfce7"/>
    </linearGradient>
  </defs>
  <rect width="640" height="360" fill="url(#gs)"/>
  <circle cx="110" cy="80" r="44" fill="#bbf7d0" opacity="0.6"/>
  <circle cx="560" cy="290" r="52" fill="#bfdbfe" opacity="0.5"/>
  <!-- caixa do sensor -->
  <ellipse cx="430" cy="268" rx="120" ry="18" fill="#1e293b" opacity="0.12"/>
  <rect x="330" y="180" width="200" height="84" rx="18" fill="#15803d"/>
  <rect x="330" y="180" width="200" height="38" rx="18" fill="#16a34a"/>
  <circle cx="494" cy="222" r="13" fill="#4ade80"/>
