<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" role="img" aria-label="Ilustração: bancada de eletrônica com microcontrolador, protoboard e ferramentas">
  <defs>
    <linearGradient id="bg2" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#f0fdf4"/>
      <stop offset="1" stop-color="#dcfce7"/>
    </linearGradient>
  </defs>
  <rect width="800" height="500" fill="url(#bg2)"/>
  <circle cx="140" cy="100" r="52" fill="#bbf7d0" opacity="0.6"/>
  <circle cx="690" cy="420" r="64" fill="#bfdbfe" opacity="0.5"/>
  <!-- bancada -->
  <rect x="60" y="330" width="680" height="24" rx="8" fill="#a16207" opacity="0.55"/>
  <rect x="60" y="354" width="680" height="90" fill="#ca8a04" opacity="0.25"/>
  <!-- protoboard -->
  <rect x="120" y="240" width="220" height="96" rx="10" fill="#f8fafc" stroke="#cbd5e1" stroke-width="3"/>
  <g fill="#94a3b8">
    <circle cx="150" cy="266" r="4"/><circle cx="174" cy="266" r="4"/><circle cx="198" cy="266" r="4"/><circle cx="222" cy="266" r="4"/><circle cx="246" cy="266" r="4"/><circle cx="270" cy="266" r="4"/><circle cx="294" cy="266" r="4"/>
    <circle cx="150" cy="288" r="4"/><circle cx="174" cy="288" r="4"/><circle cx="198" cy="288" r="4"/><circle cx="222" cy="288" r="4"/><circle cx="246" cy="288" r="4"/><circle cx="270" cy="288" r="4"/><circle cx="294" cy="288" r="4"/>
    <circle cx="150" cy="310" r="4"/><circle cx="174" cy="310" r="4"/><circle cx="198" cy="310" r="4"/><circle cx="222" cy="310" r="4"/><circle cx="246" cy="310" r="4"/><circle cx="270" cy="310" r="4"/><circle cx="294" cy="310" r="4"/>
  </g>
  <!-- microcontrolador -->
  <rect x="420" y="232" width="180" height="104" rx="12" fill="#1d4ed8"/>
  <rect x="448" y="258" width="74" height="52" rx="6" fill="#172554"/>
  <rect x="540" y="258" width="36" height="24" rx="4" fill="#93c5fd"/>
  <rect x="540" y="290" width="36" height="20" rx="4" fill="#93c5fd"/>
  <g stroke="#fbbf24" stroke-width="5" stroke-linecap="round">
    <path d="M420 252h-18M420 276h-18M420 300h-18M600 252h18M600 276h18M600 300h18"/>
  </g>
  <!-- fios conectando -->
  <path d="M340 280 Q 380 240 420 268" stroke="#ef4444" stroke-width="6" fill="none" stroke-linecap="round"/>
  <path d="M340 300 Q 382 330 420 304" stroke="#22c55e" stroke-width="6" fill="none" stroke-linecap="round"/>
  <!-- ferro de solda -->
  <g transform="rotate(-18 660 250)">
    <rect x="610" y="240" width="86" height="20" rx="10" fill="#475569"/>
    <path d="M696 250 L744 244" stroke="#94a3b8" stroke-width="8" stroke-linecap="round"/>
    <path d="M744 244 l14 -2" stroke="#f59e0b" stroke-width="5" stroke-linecap="round"/>
  </g>
  <!-- LED indicador -->
  <circle cx="510" cy="210" r="10" fill="#4ade80"/>
  <path d="M510 200v-16M498 204l-10-12M522 204l10-12" stroke="#4ade80" stroke-width="4" stroke-linecap="round"/>
</svg>
