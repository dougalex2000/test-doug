<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 520" role="img" aria-label="Ilustração panorâmica: fablab assistivo com impressoras 3D, cortadora a laser, bancada de eletrônica, painel de ferramentas e mesa central de trabalho">
  <defs>
    <linearGradient id="wall" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#eff6ff"/>
      <stop offset="1" stop-color="#dbeafe"/>
    </linearGradient>
    <linearGradient id="floor" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#cbd5e1"/>
      <stop offset="1" stop-color="#94a3b8"/>
    </linearGradient>
    <linearGradient id="machine" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#334155"/>
      <stop offset="1" stop-color="#1e293b"/>
    </linearGradient>
  </defs>

  <!-- parede e piso -->
  <rect width="1200" height="400" fill="url(#wall)"/>
  <rect y="400" width="1200" height="120" fill="url(#floor)"/>
  <path d="M0 400h1200" stroke="#64748b" stroke-width="3"/>

  <!-- luminárias -->
  <g stroke="#475569" stroke-width="4">
    <path d="M240 0v26M620 0v26M1000 0v26"/>
  </g>
  <rect x="170" y="26" width="140" height="14" rx="7" fill="#334155"/>
  <rect x="550" y="26" width="140" height="14" rx="7" fill="#334155"/>
  <rect x="930" y="26" width="140" height="14" rx="7" fill="#334155"/>
  <path d="M180 40 L160 70 L320 70 L300 40Z" fill="#fde68a" opacity="0.35"/>
  <path d="M560 40 L540 70 L700 70 L680 40Z" fill="#fde68a" opacity="0.35"/>
  <path d="M940 40 L920 70 L1080 70 L1060 40Z" fill="#fde68a" opacity="0.35"/>

  <!-- janela -->
  <rect x="60" y="80" width="180" height="120" rx="10" fill="#bfdbfe"/>
  <path d="M150 80v120M60 140h180" stroke="#eff6ff" stroke-width="8"/>
  <rect x="60" y="80" width="180" height="120" rx="10" fill="none" stroke="#93c5fd" stroke-width="6"/>

  <!-- painel de ferramentas (pegboard) -->
  <rect x="290" y="84" width="240" height="150" rx="10" fill="#fef3c7" stroke="#fcd34d" stroke-width="4"/>
  <g fill="#475569">
    <!-- chave -->
    <rect x="316" y="106" width="12" height="64" rx="6"/>
    <circle cx="322" cy="100" r="12" fill="none" stroke="#475569" stroke-width="8"/>
    <!-- martelo -->
    <rect x="368" y="104" width="44" height="18" rx="6"/>
    <rect x="384" y="118" width="12" height="56" rx="6"/>
    <!-- alicate -->
    <path d="M448 104 l10 34 m12-34 -10 34" stroke="#475569" stroke-width="10" stroke-linecap="round"/>
    <path d="M452 140 l-8 32 m22-32 8 32" stroke="#475569" stroke-width="9" stroke-linecap="round"/>
    <!-- chave de fenda -->
    <rect x="498" y="100" width="14" height="36" rx="7" fill="#dc2626"/>
    <rect x="502" y="136" width="6" height="42" rx="3"/>
  </g>
  <g fill="#94a3b8">
    <circle cx="310" cy="200" r="4"/><circle cx="340" cy="200" r="4"/><circle cx="370" cy="200" r="4"/><circle cx="400" cy="200" r="4"/><circle cx="430" cy="200" r="4"/><circle cx="460" cy="200" r="4"/><circle cx="490" cy="200" r="4"/><circle cx="510" cy="200" r="4"/>
  </g>

  <!-- estante com caixas de componentes -->
  <rect x="580" y="80" width="220" height="170" rx="10" fill="#e2e8f0" stroke="#94a3b8" stroke-width="4"/>
  <path d="M580 138h220M580 196h220" stroke="#94a3b8" stroke-width="4"/>
  <g>
    <rect x="596" y="100" width="56" height="32" rx="6" fill="#3b82f6"/>
    <rect x="662" y="100" width="56" height="32" rx="6" fill="#22c55e"/>
    <rect x="728" y="100" width="56" height="32" rx="6" fill="#f59e0b"/>
    <rect x="596" y="158" width="56" height="32" rx="6" fill="#ef4444"/>
    <rect x="662" y="158" width="56" height="32" rx="6" fill="#8b5cf6"/>
    <rect x="728" y="158" width="56" height="32" rx="6" fill="#0ea5e9"/>
    <rect x="596" y="212" width="86" height="32" rx="6" fill="#15803d"/>
    <rect x="696" y="212" width="88" height="32" rx="6" fill="#1d4ed8"/>
  </g>

  <!-- bancada das impressoras 3D -->
  <rect x="60" y="330" width="380" height="18" rx="8" fill="#a16207" opacity="0.7"/>
  <rect x="80" y="348" width="16" height="64" rx="6" fill="#78716c"/>
  <rect x="404" y="348" width="16" height="64" rx="6" fill="#78716c"/>
  <!-- impressora 1 -->
  <g>
    <rect x="92" y="216" width="150" height="16" rx="7" fill="url(#machine)"/>
    <rect x="98" y="232" width="12" height="98" rx="5" fill="url(#machine)"/>
    <rect x="224" y="232" width="12" height="98" rx="5" fill="url(#machine)"/>
    <rect x="112" y="258" width="110" height="10" rx="5" fill="#475569"/>
    <rect x="152" y="250" width="30" height="26" rx="6" fill="#1d4ed8"/>
    <path d="M163 276h8l-4 9z" fill="#f59e0b"/>
    <rect x="124" y="300" width="86" height="12" rx="5" fill="#0ea5e9"/>
    <rect x="146" y="282" width="42" height="18" rx="5" fill="#22c55e"/>
  </g>
  <!-- impressora 2 -->
  <g>
    <rect x="268" y="216" width="150" height="16" rx="7" fill="url(#machine)"/>
    <rect x="274" y="232" width="12" height="98" rx="5" fill="url(#machine)"/>
    <rect x="400" y="232" width="12" height="98" rx="5" fill="url(#machine)"/>
    <rect x="288" y="258" width="110" height="10" rx="5" fill="#475569"/>
    <rect x="350" y="250" width="30" height="26" rx="6" fill="#1d4ed8"/>
    <path d="M361 276h8l-4 9z" fill="#f59e0b"/>
    <rect x="300" y="300" width="86" height="12" rx="5" fill="#0ea5e9"/>
    <circle cx="334" cy="290" r="13" fill="#dc2626"/>
  </g>

  <!-- cortadora a laser -->
  <g>
    <rect x="480" y="280" width="300" height="80" rx="14" fill="url(#machine)"/>
    <rect x="496" y="262" width="268" height="34" rx="10" fill="#475569"/>
    <rect x="510" y="268" width="240" height="20" rx="8" fill="#93c5fd" opacity="0.75"/>
    <circle cx="756" cy="320" r="9" fill="#4ade80"/>
    <rect x="500" y="316" width="64" height="10" rx="5" fill="#64748b"/>
    <!-- feixe -->
    <path d="M630 288v-14" stroke="#ef4444" stroke-width="4" stroke-linecap="round"/>
    <circle cx="630" cy="274" r="5" fill="#ef4444"/>
    <rect x="500" y="360" width="18" height="52" rx="6" fill="#334155"/>
    <rect x="742" y="360" width="18" height="52" rx="6" fill="#334155"/>
  </g>

  <!-- bancada de eletrônica -->
  <rect x="840" y="330" width="320" height="18" rx="8" fill="#a16207" opacity="0.7"/>
  <rect x="858" y="348" width="16" height="64" rx="6" fill="#78716c"/>
  <rect x="1126" y="348" width="16" height="64" rx="6" fill="#78716c"/>
  <!-- monitor -->
  <rect x="864" y="200" width="150" height="100" rx="10" fill="#0f172a"/>
  <rect x="872" y="208" width="134" height="84" rx="6" fill="#dbeafe"/>
  <rect x="882" y="218" width="50" height="28" rx="5" fill="#3b82f6"/>
  <rect x="940" y="218" width="50" height="28" rx="5" fill="#22c55e"/>
  <rect x="882" y="254" width="108" height="10" rx="5" fill="#94a3b8"/>
  <rect x="882" y="270" width="80" height="10" rx="5" fill="#94a3b8"/>
  <rect x="926" y="300" width="26" height="18" fill="#334155"/>
  <rect x="906" y="318" width="66" height="10" rx="5" fill="#475569"/>
  <!-- protoboard e microcontrolador na bancada -->
  <rect x="1040" y="296" width="104" height="34" rx="8" fill="#f8fafc" stroke="#cbd5e1" stroke-width="3"/>
  <rect x="1056" y="304" width="40" height="18" rx="4" fill="#1d4ed8"/>
  <path d="M1104 308h22M1104 318h22" stroke="#f59e0b" stroke-width="4" stroke-linecap="round"/>
  <!-- luminária de bancada -->
  <path d="M1116 250 L1090 282" stroke="#475569" stroke-width="8" stroke-linecap="round"/>
  <path d="M1116 250 l24 -10" stroke="#475569" stroke-width="8" stroke-linecap="round"/>
  <circle cx="1146" cy="236" r="14" fill="#fbbf24"/>

  <!-- mesa central de trabalho -->
  <ellipse cx="600" cy="486" rx="240" ry="18" fill="#1e293b" opacity="0.14"/>
  <rect x="400" y="430" width="400" height="22" rx="10" fill="#ca8a04" opacity="0.85"/>
  <rect x="424" y="452" width="18" height="48" rx="6" fill="#78716c"/>
  <rect x="758" y="452" width="18" height="48" rx="6" fill="#78716c"/>
  <!-- itens sobre a mesa: acionador, keyguard, carretel -->
  <ellipse cx="480" cy="430" rx="44" ry="10" fill="#b91c1c"/>
  <ellipse cx="480" cy="424" rx="44" ry="14" fill="#dc2626"/>
  <ellipse cx="480" cy="420" rx="32" ry="9" fill="#f87171"/>
  <rect x="560" y="408" width="110" height="22" rx="8" fill="#22c55e"/>
  <circle cx="586" cy="419" r="7" fill="#dcfce7"/>
  <circle cx="614" cy="419" r="7" fill="#dcfce7"/>
  <circle cx="642" cy="419" r="7" fill="#dcfce7"/>
  <circle cx="724" cy="408" r="24" fill="#e2e8f0"/>
  <circle cx="724" cy="408" r="20" fill="none" stroke="#3b82f6" stroke-width="8"/>
  <circle cx="724" cy="408" r="6" fill="#94a3b8"/>

  <!-- planta -->
  <rect x="1066" y="430" width="44" height="40" rx="8" fill="#b45309"/>
  <path d="M1088 430q-26-30-10-56M1088 430q4-34 26-44M1088 430q-2-26-30-30" stroke="#16a34a" stroke-width="9" fill="none" stroke-linecap="round"/>
</svg>
