<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" role="img" aria-label="Ilustração: impressora 3D produzindo peça assistiva na oficina maker">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#eff6ff"/>
      <stop offset="1" stop-color="#dbeafe"/>
    </linearGradient>
    <linearGradient id="frame" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#334155"/>
      <stop offset="1" stop-color="#1e293b"/>
    </linearGradient>
  </defs>
  <rect width="800" height="500" fill="url(#bg)"/>
  <circle cx="660" cy="90" r="46" fill="#bfdbfe" opacity="0.6"/>
  <circle cx="120" cy="400" r="70" fill="#bbf7d0" opacity="0.45"/>
  <!-- mesa -->
  <rect x="80" y="400" width="640" height="22" rx="8" fill="#94a3b8"/>
  <rect x="120" y="422" width="22" height="58" rx="6" fill="#64748b"/>
  <rect x="658" y="422" width="22" height="58" rx="6" fill="#64748b"/>
  <!-- impressora: colunas e travessas -->
  <rect x="220" y="120" width="18" height="280" rx="6" fill="url(#frame)"/>
  <rect x="562" y="120" width="18" height="280" rx="6" fill="url(#frame)"/>
  <rect x="210" y="104" width="380" height="26" rx="9" fill="url(#frame)"/>
  <rect x="210" y="374" width="380" height="26" rx="9" fill="url(#frame)"/>
  <!-- eixo e carro -->
  <rect x="238" y="190" width="324" height="14" rx="6" fill="#475569"/>
  <rect x="368" y="176" width="64" height="44" rx="8" fill="#1d4ed8"/>
  <rect x="384" y="220" width="32" height="22" rx="4" fill="#3b82f6"/>
  <path d="M392 242h16l-8 16z" fill="#f59e0b"/>
  <!-- filamento -->
  <path d="M400 258v22" stroke="#22c55e" stroke-width="5" stroke-linecap="round"/>
  <!-- peça impressa: keyguard -->
  <rect x="330" y="280" width="140" height="64" rx="10" fill="#22c55e"/>
  <rect x="330" y="280" width="140" height="30" rx="10" fill="#4ade80"/>
  <circle cx="362" cy="312" r="11" fill="#dcfce7"/>
  <circle cx="400" cy="312" r="11" fill="#dcfce7"/>
  <circle cx="438" cy="312" r="11" fill="#dcfce7"/>
  <!-- mesa de impressão -->
  <rect x="290" y="344" width="220" height="16" rx="6" fill="#0ea5e9"/>
  <rect x="276" y="358" width="248" height="12" rx="6" fill="#475569"/>
  <!-- carretel de filamento -->
  <circle cx="660" cy="330" r="44" fill="#e2e8f0"/>
  <circle cx="660" cy="330" r="40" fill="none" stroke="#22c55e" stroke-width="13"/>
  <circle cx="660" cy="330" r="12" fill="#94a3b8"/>
  <!-- peças prontas -->
  <rect x="120" y="356" width="64" height="44" rx="10" fill="#1d4ed8"/>
  <circle cx="152" cy="368" r="20" fill="#3b82f6"/>
  <circle cx="152" cy="366" r="14" fill="#bfdbfe"/>
</svg>
